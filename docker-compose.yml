services:
  yt-downloader:
    build:
      context: .
    container_name: yt-downloader
    labels:
      - "app.version=1.0.0"
      - "app.author=gylangsatria"
      - "app.github=https://github.com/gylangsatria"
    stdin_open: true
    tty: true
    volumes:
      - ./downloads:/app/downloads
      - ./data/logs:/app/.yt-dlp-logs
      - ./data/config:/app/.yt-dlp-config
      # Cookie file (optional) — export dari browser untuk akses situs proteksi
      - ./data/cookies.txt:/app/.yt-dlp-config/cookies.txt:ro
    environment:
      - USERNAME=${USER:-appuser}
      - USER_UID=${UID:-1000}
      - USER_GID=${GID:-1000}
      - VIDEO_DIR=/app/downloads/Videos
      - MUSIC_DIR=/app/downloads/Music
      - HOME=/app
    restart: unless-stopped